<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Route App Launcher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/launcher.css">
</head>
<body>
<div id="loadingScreen" class="loading-screen">ЗАГРУЗКА ДАННЫХ</div>

<div id="routesScreen" class="screen" style="display:none;">
    <div class="card">
        <h1>Список маршрутов</h1>
        <select id="routesSelect" class="routes-select">
            <option value="">Выберите маршрут</option>
        </select>
        <div id="routeTools" class="route-tools" style="display:none;">
            <button id="renameRouteBtn" class="tool-btn" aria-label="Переименовать">✏️ Переименовать</button>
            <button id="copyLinkBtn" class="tool-btn" aria-label="Скопировать ссылку">🔗 Скопировать</button>
            <button id="deleteRouteBtn" class="tool-btn tool-btn-danger" aria-label="Удалить маршрут">🗑️ Удалить</button>
        </div>
        <button id="createNewBtn" class="btn btn-muted">Создать новый маршрут</button>
        <div id="openActions" class="actions" style="display:none;">
            <button id="openEditorBtn" class="btn btn-green">Открыть маршрут в редакторе</button>
            <button id="openNavigatorBtn" class="btn btn-green">Открыть маршрут в навигаторе</button>
        </div>
    </div>
</div>

<div id="emptyScreen" class="screen" style="display:none;">
    <div class="card small">
        <h1>Маршрутов нет</h1>
        <button id="emptyCreateBtn" class="btn btn-green">Создать маршрут</button>
    </div>
</div>

<div id="createScreen" class="screen" style="display:none;">
    <div class="card small">
        <h1>Новый маршрут</h1>
        <input id="routeNameInput" class="input" type="text" placeholder="Введите название" oninput="this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '')">
        <div class="hint">Допустимы только английские буквы, цифры и знак нижнего подчеркивания.</div>
        <button id="confirmCreateBtn" class="btn btn-green">Создать</button>
    </div>
</div>

<script src="assets/js/shared.js"></script>
<script src="assets/js/launcher.js"></script>
</body>
</html>
