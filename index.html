<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Route App Launcher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/launcher.css">
</head>
<body>
<div class="launcher">
    <div class="card">
        <h1>Выберите режим</h1>
        <div class="status" id="statusText">Загрузка...</div>
        <div class="mode-row">
            <button id="modeEditor" class="mode-btn active">Редактор</button>
            <button id="modeNav" class="mode-btn">Навигатор</button>
        </div>
        <div id="routeList" class="list"></div>
        <div id="emptyBlock" class="empty-block">
            <input id="newRouteName" class="input" type="text" placeholder="Название нового маршрута" oninput="this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '')">
            <button id="createRouteBtn" class="create-btn">Создать первый маршрут</button>
        </div>
        <button id="openBtn" class="open-btn">Открыть</button>
    </div>
</div>
<script src="assets/js/shared.js"></script>
<script src="assets/js/launcher.js"></script>
</body>
</html>
