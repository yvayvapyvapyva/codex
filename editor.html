<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Route Editor Pro | Cloud Sync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=YANDEX_API_KEY&lang=ru_RU&suppressMapOpenBlock=true"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="assets/css/shared.css">
    <link rel="stylesheet" href="assets/css/editor.css">
</head>
<body>

<div id="toast">Готово</div>
<div id="welcomeScreen"><div class="welcome-card"><h2 style="margin: 0 0 8px 0; font-weight:800;">Route Editor</h2><div id="userIdBadge" style="background:rgba(255,255,255,0.12);color:#d1d5db;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;margin-bottom:18px;border:1px solid rgba(255,255,255,0.2)">Загрузка...</div><div style="font-size:13px; color:#c7c9d1; margin-top:6px;">Авторизация через параметр URL <b>t</b>...</div></div></div>
<div id="map"></div>
<div class="top-controls" id="uiControls" style="display:none"><button id="listPointsBtn" class="btn-top" onclick="openPointsOrderModal()" style="visibility:hidden"><span id="routeLabelText">Маршрут</span></button><button class="btn-top" onclick="openSettingsModal()"><span class="btn-icon">⚙️</span></button></div>
<div class="bottom-center-controls" id="bottomControls"><button id="addMarkerBtn" class="btn-add-main" onclick="handleAddBtnClick()" style="visibility:hidden"><span id="addText">Добавить новую точку</span></button></div>
<div id="floatingSave" class="floating-save"><button id="saveStateBtn" class="btn-save-glass" onclick="saveGist()">Сохранить изменения</button></div>
<div id="dropdownOverlay" class="dropdown-overlay" onclick="closeD()"></div>
<div id="listColorDropdown" class="color-dropdown"></div>

<div id="pointsOrderModal" class="modal" onclick="if(event.target===this) toggleM('pointsOrderModal')"><div class="modal-content"><div class="modal-header"><h3 id="orderModalTitle">Маршрут</h3><button class="close-circle" onclick="toggleM('pointsOrderModal')">✕</button></div><div class="editor-section" id="pointsSortList"></div><div style="padding: 20px;"><button id="saveInListBtn" class="btn-action" onclick="handleModalSave()"><span id="saveBtnText">Готово</span></button></div></div></div>
<div id="settingsModal" class="modal settings-sheet" onclick="if(event.target===this) toggleM('settingsModal')"><div class="modal-content"><div class="settings-header"><button class="close-circle" onclick="toggleM('settingsModal')">✕</button><div style="flex:1; min-width:0;"><h3>Настройки</h3></div><button class="btn-done" onclick="toggleM('settingsModal')">Готово</button></div><div class="editor-section settings-body"><div class="settings-section"><span class="section-title">Новый маршрут</span><div class="input-wrapper"><input type="text" id="newRouteName" placeholder="Название (A-Z, 0-9)" oninput="this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '')"><button id="btnCreateFile" style="border:none; padding:8px 16px; border-radius:12px; font-weight:700; margin-right:4px;" onclick="handleCreateNew()">Создать</button></div><div class="settings-note">Используйте короткое имя латиницей для удобного поиска.</div></div><div class="settings-section"><div class="input-wrapper route-search"><input type="text" id="routeSearchInput" placeholder="Поиск маршрута"></div><div class="settings-group gist-list" id="settingsGistList"></div></div><div id="fileActions" class="settings-section" style="display:none;"><div class="selected-route-card"><div class="name" id="selectedRouteName">Маршрут</div><div class="sub" id="selectedRouteSubtitle">Выберите маршрут из списка выше.</div><div class="rename-row"><div class="input-wrapper" style="margin:0; flex:1;"><input type="text" id="renameRouteInput" placeholder="Новое имя маршрута" oninput="this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '')"></div><button id="renameRouteBtn" class="btn-action" onclick="renameActiveRoute()">Переименовать</button></div></div><div class="settings-group"><div class="settings-item" onclick="launchNavigatorWithCurrentRoute()"><span style="font-weight: 500;">🧭 Запустить навигатор</span><span class="chevron">›</span></div><div class="settings-item" onclick="shareActiveRoute()"><span style="font-weight: 500;">🔗 Поделиться ссылкой</span><span class="chevron">›</span></div></div><div class="settings-group"><div class="settings-item" onclick="deleteActiveRoute()"><span style="font-weight: 500; color: var(--danger);">🗑️ Удалить маршрут</span></div></div></div></div></div></div>

<script src="assets/js/shared.js"></script>
<script src="assets/js/editor.js"></script>
</body>
</html>
